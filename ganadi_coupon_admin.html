<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>가나디쿠폰샵 관리자</title>
<link rel="manifest" href="manifest_admin.json">
<meta name="theme-color" content="#0c0a09">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="쿠폰샵 관리자">
<link rel="icon" type="image/png" sizes="32x32" href="icon_admin_32.png">
<link rel="apple-touch-icon" href="icon_admin_180.png">
<style>
:root{
  --bg:#0c0a09;--bg2:#171513;--surface:#22201d;--surface2:#2d2a26;
  --border:rgba(255,255,255,0.08);--text1:#fafaf9;--text2:rgba(250,250,249,0.65);
  --text3:rgba(250,250,249,0.4);--gold:#f59e0b;--gold2:#fbbf24;
  --danger:#ef4444;--success:#10b981;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text1);
  font-family:'Apple SD Gothic Neo',-apple-system,sans-serif;font-size:14px;}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom));
  padding-top:env(safe-area-inset-top);}
button{font-family:inherit;cursor:pointer;}
input{font-family:inherit;}

.header{padding:calc(12px + env(safe-area-inset-top)) 20px 10px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);}
.brand-name{font-size:15px;font-weight:800;}
.header-stats{display:flex;gap:14px;}
.stat{text-align:center;}
.stat-label{font-size:9px;color:var(--text3);}
.stat-value{font-size:14px;font-weight:800;color:var(--gold2);}

.content{padding:16px 20px;}

.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.section-title{font-size:18px;font-weight:800;margin:0;}
.section-count{font-size:12px;color:var(--text3);}

.btn-add{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
  border:none;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:700;}

.list{display:flex;flex-direction:column;gap:8px;}
.item{background:var(--surface);border-radius:14px;padding:13px;
  display:flex;align-items:center;gap:12px;border:1px solid var(--border);}
.item-img{width:48px;height:48px;background:var(--surface2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.item-info{flex:1;}
.item-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.item-meta{font-size:11px;color:var(--text3);}
.item-action{border:none;padding:8px;border-radius:8px;font-size:14px;margin-left:4px;}
.item-action.edit{background:rgba(59,130,246,0.15);color:#3b82f6;}
.item-action.del{background:rgba(239,68,68,0.15);color:var(--danger);}

.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(23,21,19,0.97);
  backdrop-filter:blur(20px);border-top:1px solid var(--border);
  display:flex;padding:8px 0 calc(10px + env(safe-area-inset-bottom));z-index:50;}
.tab{flex:1;background:none;border:none;padding:6px 0;
  display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text3);}
.tab.active{color:var(--gold2);}
.tab-icon{font-size:20px;}
.tab-label{font-size:10px;font-weight:600;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);
  display:none;align-items:flex-end;justify-content:center;z-index:100;}
.modal-overlay.show{display:flex;}
.modal-panel{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;
  max-width:480px;padding:24px 20px calc(32px + env(safe-area-inset-bottom));
  max-height:85vh;overflow-y:auto;border-top:1px solid var(--border);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:800;margin:0 0 16px;}
.modal-text{font-size:13px;color:var(--text2);margin:0 0 20px;line-height:1.6;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.modal-btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;}
.modal-btn-cancel{background:var(--surface);color:var(--text2);}
.modal-btn-confirm{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;}
.modal-btn-danger{background:var(--danger);color:#fff;}

.field{margin-bottom:14px;}
.field-label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;}
.field-input{width:100%;padding:13px;background:var(--surface);
  border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text1);outline:none;}

.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.emoji-btn{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;font-size:18px;padding:0;}
.emoji-btn.selected{background:var(--gold);border-color:var(--gold2);}

.empty{background:var(--surface);border-radius:14px;padding:48px 20px;
  text-align:center;border:1px solid var(--border);}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:0.5;}
.empty-text{font-size:13px;color:var(--text3);}

.toast{position:fixed;top:calc(env(safe-area-inset-top)+16px);left:50%;
  transform:translateX(-50%) translateY(-200px);background:var(--surface);
  color:#fff;padding:12px 22px;border-radius:12px;font-size:13px;font-weight:600;
  border:1px solid var(--border);z-index:200;transition:transform 0.3s;
  max-width:calc(100% - 32px);text-align:center;white-space:pre-wrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:#7f1d1d;border-color:#dc2626;}
.toast.success{background:#064e3b;border-color:#10b981;}

.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

.student-row{background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.student-row-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.student-row-body{background:var(--bg2);padding:10px 14px;border-top:1px solid var(--border);display:none;}
.student-row-body.open{display:block;}
.coupon-use-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.coupon-use-row:last-child{border-bottom:none;}
.btn-use{background:rgba(16,185,129,0.15);color:var(--success);border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;}

.resell-item{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:8px;}
.btn-cancel-resell{background:rgba(239,68,68,0.15);color:var(--danger);border:none;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;}

.give-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;margin-bottom:16px;}
.give-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:8px 4px;color:var(--text1);font-size:12px;font-weight:600;text-align:center;}
.give-btn.selected{background:rgba(245,158,11,0.2);border-color:var(--gold2);color:var(--gold2);}
.give-product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin-bottom:16px;}
.give-product-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:10px 4px;text-align:center;}
.give-product-btn.selected{background:rgba(245,158,11,0.2);border-color:var(--gold2);}
.give-action-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;}

.search-input{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:13px;outline:none;margin-bottom:12px;}
</style>
</head>
<body>

<div id="app"></div>

<div class="modal-overlay" id="main-modal">
  <div class="modal-panel" id="modal-inner"></div>
</div>
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, update, set, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB = {
  apiKey:"AIzaSyDEGBu8sFChEdtnQEEC1FFZaAIwUr9fWpc",
  authDomain:"stock-c985f.firebaseapp.com",
  databaseURL:"https://stock-c985f-default-rtdb.firebaseio.com",
  projectId:"stock-c985f",
  storageBucket:"stock-c985f.firebasestorage.app",
  messagingSenderId:"1082843629086",
  appId:"1:1082843629086:web:58c6b2ca396cb7842d100f"
};

const GROUPS = [
  {id:1,members:['주시연','김지성','신재은','서은수']},
  {id:2,members:['강민채','권용민','이다영','김준우']},
  {id:3,members:['박준서','조혜원','김주이','윤지환']},
  {id:4,members:['최효민','정서윤','이세은','이강민']},
  {id:5,members:['김지원','임승언','이서준','김수현','이윤아']},
  {id:6,members:['이주호','민나진','최상윤','황세현','이수빈']},
];
const ALL_STUDENTS = GROUPS.flatMap(g=>g.members.map(m=>({name:m,group:g.id})));
const fmt = n => Number(n||0).toLocaleString('ko-KR');
const db = getDatabase(initializeApp(FB));

let activeTab = 'products';
let fbState = null;
let searchQuery = '';
let selEmoji = '🎁';

const $app = document.getElementById('app');
const $modal = document.getElementById('main-modal');
const $modalInner = document.getElementById('modal-inner');
const $toast = document.getElementById('toast');

function showToast(msg, type=''){
  $toast.textContent = msg;
  $toast.className = `toast ${type} show`;
  setTimeout(()=>$toast.classList.remove('show'), 2500);
}
function showModal(html){ $modalInner.innerHTML = html; $modal.classList.add('show'); }
function closeModal(){ $modal.classList.remove('show'); }
$modal.addEventListener('click', e=>{ if(e.target===$modal) closeModal(); });

onValue(ref(db,'state'), snap=>{
  fbState = snap.val() || {};
  if(!fbState.students) fbState.students = {};
  if(!fbState.couponShop) fbState.couponShop = {};
  if(!fbState.couponShop.products) fbState.couponShop.products = {};
  if(!fbState.couponShop.resell) fbState.couponShop.resell = {};
  render();
});

function render(){
  if(!fbState){
    $app.innerHTML = `<div class="loading"><div><div class="spinner"></div>연결 중...</div></div>`;
    return;
  }
  const pCount = Object.keys(fbState.couponShop.products||{}).length;
  const rCount = Object.keys(fbState.couponShop.resell||{}).length;
  let cCount = 0;
  Object.values(fbState.students||{}).forEach(s=>{ if(s.coupons) cCount+=Object.keys(s.coupons).length; });

  $app.innerHTML = `
    <div class="header">
      <div class="brand-name">🍀 가나디쿠폰샵 관리자</div>
      <div class="header-stats">
        <div class="stat"><div class="stat-label">상품</div><div class="stat-value">${pCount}</div></div>
        <div class="stat"><div class="stat-label">쿠폰</div><div class="stat-value">${cCount}</div></div>
        <div class="stat"><div class="stat-label">리셀</div><div class="stat-value">${rCount}</div></div>
      </div>
    </div>
    <div class="content" id="tab-content"></div>
    <div class="tabbar">
      <button class="tab ${activeTab==='products'?'active':''}" data-tab="products">
        <div class="tab-icon">📦</div><div class="tab-label">상품관리</div>
      </button>
      <button class="tab ${activeTab==='give'?'active':''}" data-tab="give">
        <div class="tab-icon">🎟️</div><div class="tab-label">쿠폰지급</div>
      </button>
      <button class="tab ${activeTab==='students'?'active':''}" data-tab="students">
        <div class="tab-icon">👥</div><div class="tab-label">학생현황</div>
      </button>
      <button class="tab ${activeTab==='resell'?'active':''}" data-tab="resell">
        <div class="tab-icon">🔄</div><div class="tab-label">리셀샵</div>
      </button>
    </div>
  `;
  $app.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{ activeTab = t.dataset.tab; render(); });
  });
  renderTabContent();
}

function renderTabContent(){
  const $c = document.getElementById('tab-content');
  if(!$c) return;
  if(activeTab==='products') renderProducts($c);
  else if(activeTab==='give') renderGive($c);
  else if(activeTab==='students') renderStudents($c);
  else if(activeTab==='resell') renderResell($c);
}

function renderProducts($c){
  const products = Object.entries(fbState.couponShop.products||{})
    .map(([id,p])=>({id,...p})).filter(p=>p&&p.name)
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  let html = `<div class="section-head">
    <h2 class="section-title">상품 관리</h2>
    <button class="btn-add" id="btn-add-product">＋ 상품 등록</button>
  </div>`;
  if(products.length===0){
    html += `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">등록된 상품이 없습니다</div></div>`;
  } else {
    html += `<div class="list">`;
    products.forEach(p=>{
      html += `<div class="item">
        <div class="item-img">${p.image||'🎁'}</div>
        <div class="item-info">
          <div class="item-name">${p.name}</div>
          <div class="item-meta">${fmt(p.price)}점 · 재고 ${p.stock||0}개</div>
        </div>
        <button class="item-action edit" data-edit="${p.id}">✏️</button>
        <button class="item-action del" data-del="${p.id}">🗑️</button>
      </div>`;
    });
    html += `</div>`;
  }
  $c.innerHTML = html;

  document.getElementById('btn-add-product').addEventListener('click', openAddProductModal);
  $c.querySelectorAll('[data-edit]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p = products.find(x=>x.id===b.dataset.edit);
      if(p) openEditProductModal(p);
    });
  });
  $c.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const p = products.find(x=>x.id===b.dataset.del);
      if(p) confirmDeleteProduct(p);
    });
  });
}

function openAddProductModal(){
  selEmoji = '🎁';
  const emojis = ['🎁','📚','🍪','🍭','🪑','🎵','🎮','⚽','🏆','✏️','🎨','🍰','☕','🎟️','⭐','💎'];
  showModal(`
    <div class="modal-handle"></div>
    <h3 class="modal-title">상품 등록</h3>
    <div class="field">
      <label class="field-label">아이콘</label>
      <div class="emoji-grid" id="egrid">
        ${emojis.map(e=>`<button class="emoji-btn${e===selEmoji?' selected':''}" data-e="${e}">${e}</button>`).join('')}
      </div>
    </div>
    <div class="field">
      <label class="field-label">상품명</label>
      <input class="field-input" id="pname" placeholder="예: 숙제 면제권">
    </div>
    <div class="field">
      <label class="field-label">가격 (점)</label>
      <input class="field-input" id="pprice" type="number" inputmode="numeric" placeholder="예: 5000">
    </div>
    <div class="field">
      <label class="field-label">재고 수량</label>
      <input class="field-input" id="pstock" type="number" inputmode="numeric" placeholder="예: 10">
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="mc">취소</button>
      <button class="modal-btn modal-btn-confirm" id="mok">등록하기</button>
    </div>
  `);
  document.querySelectorAll('#egrid .emoji-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      selEmoji = b.dataset.e;
      document.querySelectorAll('#egrid .emoji-btn').forEach(x=>x.classList.toggle('selected', x.dataset.e===selEmoji));
    });
  });
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('mok').addEventListener('click', async ()=>{
    const name = document.getElementById('pname').value.trim();
    const price = parseInt(document.getElementById('pprice').value);
    const stock = parseInt(document.getElementById('pstock').value);
    if(!name||isNaN(price)||price<=0||isNaN(stock)||stock<0){
      showToast('모든 항목을 올바르게 입력해주세요','error'); return;
    }
    closeModal();
    try {
      const pid = 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
      await set(ref(db,`state/couponShop/products/${pid}`),{
        name, price, stock, image:selEmoji, createdAt:Date.now()
      });
      showToast('상품이 등록되었습니다','success');
    } catch(e){ showToast('오류가 발생했습니다','error'); }
  });
}

function openEditProductModal(p){
  selEmoji = p.image||'🎁';
  const emojis = ['🎁','📚','🍪','🍭','🪑','🎵','🎮','⚽','🏆','✏️','🎨','🍰','☕','🎟️','⭐','💎'];
  showModal(`
    <div class="modal-handle"></div>
    <h3 class="modal-title">상품 수정</h3>
    <div class="field">
      <label class="field-label">아이콘</label>
      <div class="emoji-grid" id="egrid">
        ${emojis.map(e=>`<button class="emoji-btn${e===selEmoji?' selected':''}" data-e="${e}">${e}</button>`).join('')}
      </div>
    </div>
    <div class="field">
      <label class="field-label">상품명</label>
      <input class="field-input" id="pname" value="${p.name}">
    </div>
    <div class="field">
      <label class="field-label">가격 (점)</label>
      <input class="field-input" id="pprice" type="number" inputmode="numeric" value="${p.price}">
    </div>
    <div class="field">
      <label class="field-label">재고 수량</label>
      <input class="field-input" id="pstock" type="number" inputmode="numeric" value="${p.stock||0}">
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="mc">취소</button>
      <button class="modal-btn modal-btn-confirm" id="mok">수정하기</button>
    </div>
  `);
  document.querySelectorAll('#egrid .emoji-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      selEmoji = b.dataset.e;
      document.querySelectorAll('#egrid .emoji-btn').forEach(x=>x.classList.toggle('selected', x.dataset.e===selEmoji));
    });
  });
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('mok').addEventListener('click', async ()=>{
    const name = document.getElementById('pname').value.trim();
    const price = parseInt(document.getElementById('pprice').value);
    const stock = parseInt(document.getElementById('pstock').value);
    if(!name||isNaN(price)||price<=0||isNaN(stock)||stock<0){
      showToast('모든 항목을 올바르게 입력해주세요','error'); return;
    }
    closeModal();
    try {
      await update(ref(db,`state/couponShop/products/${p.id}`),{name,price,stock,image:selEmoji});
      showToast('상품이 수정되었습니다','success');
    } catch(e){ showToast('오류가 발생했습니다','error'); }
  });
}

function confirmDeleteProduct(p){
  showModal(`
    <div class="modal-handle"></div>
    <h3 class="modal-title">상품 삭제</h3>
    <p class="modal-text">${p.name}을(를) 삭제하시겠습니까?</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="mc">취소</button>
      <button class="modal-btn modal-btn-danger" id="mok">삭제</button>
    </div>
  `);
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('mok').addEventListener('click', async ()=>{
    closeModal();
    try {
      await remove(ref(db,`state/couponShop/products/${p.id}`));
      showToast('상품이 삭제되었습니다','success');
    } catch(e){ showToast('오류가 발생했습니다','error'); }
  });
}

function renderGive($c){
  const products = Object.entries(fbState.couponShop.products||{})
    .map(([id,p])=>({id,...p})).filter(p=>p&&p.name);
  let giveTarget=null, giveProduct=null;

  $c.innerHTML = `
    <div class="section-head"><h2 class="section-title">쿠폰 지급</h2></div>
    <div class="field">
      <label class="field-label">학생 선택</label>
      <div class="give-grid" id="sGrid">
        ${ALL_STUDENTS.map(s=>`<button class="give-btn" data-s="${s.name}">${s.name}</button>`).join('')}
      </div>
    </div>
    <div class="field">
      <label class="field-label">상품 선택</label>
      <div class="give-product-grid" id="pGrid">
        ${products.map(p=>`<button class="give-product-btn" data-p="${p.id}">
          <div style="font-size:22px;">${p.image||'🎁'}</div>
          <div style="font-size:10px;margin-top:4px;color:var(--text2);">${p.name}</div>
        </button>`).join('')}
      </div>
    </div>
    <button class="give-action-btn" id="giveBtn">지급하기</button>
  `;

  $c.querySelectorAll('#sGrid [data-s]').forEach(b=>{
    b.addEventListener('click', ()=>{
      giveTarget = b.dataset.s;
      $c.querySelectorAll('#sGrid [data-s]').forEach(x=>x.classList.toggle('selected', x.dataset.s===giveTarget));
    });
  });
  $c.querySelectorAll('#pGrid [data-p]').forEach(b=>{
    b.addEventListener('click', ()=>{
      giveProduct = products.find(x=>x.id===b.dataset.p);
      $c.querySelectorAll('#pGrid [data-p]').forEach(x=>x.classList.toggle('selected', x.dataset.p===b.dataset.p));
    });
  });
  document.getElementById('giveBtn').addEventListener('click', async ()=>{
    if(!giveTarget||!giveProduct){ showToast('학생과 상품을 선택해주세요','error'); return; }
    try {
      await runTransaction(ref(db,`state/students/${giveTarget}`), cur=>{
        if(!cur) cur={deposit:0};
        if(!cur.coupons) cur.coupons={};
        const cid='c_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
        cur.coupons[cid]={
          name:giveProduct.name, image:giveProduct.image,
          originalPrice:giveProduct.price, productId:giveProduct.id,
          acquiredAt:Date.now(), gifted:true,
          expiresAt:Date.now()+7*24*3600*1000
        };
        return cur;
      });
      showToast(`${giveTarget}님께 ${giveProduct.name} 지급 완료`,'success');
      giveTarget=null; giveProduct=null;
      renderGive($c);
    } catch(e){ showToast('오류가 발생했습니다','error'); }
  });
}

function renderStudents($c){
  $c.innerHTML = `
    <input class="search-input" id="searchInput" placeholder="🔍 학생명 검색" value="${searchQuery}">
    <div id="sList"></div>
  `;
  document.getElementById('searchInput').addEventListener('input', e=>{
    searchQuery = e.target.value;
    buildList();
  });
  buildList();

  function buildList(){
    const filtered = ALL_STUDENTS.filter(s=>s.name.includes(searchQuery));
    let h = '';
    filtered.forEach(s=>{
      const sd = fbState.students?.[s.name]||{};
      const deposit = sd.deposit??0;
      const coupons = Object.entries(sd.coupons||{}).map(([id,c])=>({id,...c}));
      h += `<div class="student-row">
        <div class="student-row-head" data-name="${s.name}">
          <div>
            <strong>${s.name}</strong>
            <span style="font-size:11px;color:var(--text3);margin-left:6px;">${s.group}모둠</span>
          </div>
          <div style="text-align:right;font-size:12px;color:var(--text3);">
            <div>예금 ${fmt(deposit)}점</div>
            <div style="color:var(--gold2);">쿠폰 ${coupons.length}장</div>
          </div>
        </div>
        <div class="student-row-body" id="body_${s.name}">
          ${coupons.length===0
            ? '<div style="color:var(--text3);font-size:12px;padding:4px 0;">보유한 쿠폰이 없습니다</div>'
            : coupons.map(c=>`
              <div class="coupon-use-row">
                <div><span style="margin-right:6px;">${c.image||'🎁'}</span>${c.name}</div>
                <button class="btn-use" data-use="${c.id}" data-who="${s.name}">사용</button>
              </div>`).join('')}
        </div>
      </div>`;
    });
    document.getElementById('sList').innerHTML = h;
    document.querySelectorAll('.student-row-head').forEach(h=>{
      h.addEventListener('click', ()=>{
        const body = document.getElementById('body_'+h.dataset.name);
        if(body) body.classList.toggle('open');
      });
    });
    document.querySelectorAll('.btn-use').forEach(b=>{
      b.addEventListener('click', ()=>confirmUseCoupon(b.dataset.who, b.dataset.use));
    });
  }
}

function confirmUseCoupon(studentName, couponId){
  showModal(`
    <div class="modal-handle"></div>
    <h3 class="modal-title">쿠폰 사용</h3>
    <p class="modal-text">${studentName}님의 쿠폰을 사용 처리하시겠습니까?</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="mc">취소</button>
      <button class="modal-btn modal-btn-danger" id="mok">사용 처리</button>
    </div>
  `);
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('mok').addEventListener('click', async ()=>{
    closeModal();
    try {
      await remove(ref(db,`state/students/${studentName}/coupons/${couponId}`));
      showToast('쿠폰이 사용 처리되었습니다','success');
    } catch(e){ showToast('오류가 발생했습니다','error'); }
  });
}

function renderResell($c){
  const items = Object.entries(fbState.couponShop.resell||{})
    .map(([id,r])=>({id,...r})).filter(r=>r&&r.name);
  let html = `<div class="section-head">
    <h2 class="section-title">리셀샵 모니터링</h2>
    <span class="section-count">${items.length}개</span>
  </div>`;
  if(items.length===0){
    html+=`<div class="empty"><div class="empty-icon">🔄</div><div class="empty-text">등록된 리셀 상품이 없습니다</div></div>`;
  } else {
    items.forEach(item=>{
      html+=`<div class="resell-item">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div><span style="font-size:18px;margin-right:8px;">${item.image||'🎁'}</span><strong>${item.name}</strong></div>
          <button class="btn-cancel-resell" data-id="${item.id}">취소</button>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px;">판매자: ${item.sellerName} · ${fmt(item.price)}점</div>
      </div>`;
    });
  }
  $c.innerHTML = html;
  $c.querySelectorAll('[data-id]').forEach(b=>{
    b.addEventListener('click', ()=>{
      const item = items.find(x=>x.id===b.dataset.id);
      if(item) confirmCancelResell(item);
    });
  });
}

function confirmCancelResell(item){
  showModal(`
    <div class="modal-handle"></div>
    <h3 class="modal-title">리셀 취소</h3>
    <p class="modal-text">${item.name} 리셀 등록을 취소하시겠습니까?</p>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" id="mc">취소</button>
      <button class="modal-btn modal-btn-danger" id="mok">취소하기</button>
    </div>
  `);
  document.getElementById('mc').addEventListener('click', closeModal);
  document.getElementById('mok').addEventListener('click', async ()=>{
    closeModal();
    try {
      await remove(ref(db,`state/couponShop/resell/${item.id}`));
      showToast('리셀 등록이 취소되었습니다','success');
    } catch(e){ showToast('오류가 발생했습니다','error'); }
  });
}

render();
</script>
</body>
</html>
